<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="720" fill="#f7f3ef"/>
  <style>
    .title { font: 700 42px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1f1b18; }
    .label { font: 700 28px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1f1b18; }
    .body { font: 500 22px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #3f3831; }
    .muted { font: 500 18px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6a5f54; }
  </style>
  <text x="80" y="82" class="title">Round one versus round two</text>

  <rect x="80" y="140" width="560" height="480" rx="32" fill="#fffaf5" stroke="#d8cbc0" stroke-width="3"/>
  <text x="120" y="200" class="label">round 1 / `sgbrain/`</text>
  <text x="120" y="254" class="body">• raw NIfTI</text>
  <text x="120" y="294" class="body">• FreeSurfer subject directory</text>
  <text x="120" y="334" class="body">• a few blunt STL exports</text>
  <text x="120" y="374" class="body">• enough to prove this was possible</text>
  <text x="120" y="444" class="muted">result:</text>
  <text x="120" y="482" class="body">“I can extract my brain.”</text>

  <rect x="760" y="140" width="560" height="480" rx="32" fill="#fffaf5" stroke="#d8cbc0" stroke-width="3"/>
  <text x="800" y="200" class="label">round 2 / `sgbrain-blog/`</text>
  <text x="800" y="254" class="body">• atlas-based segmentation script</text>
  <text x="800" y="294" class="body">• proper FreeSurfer export pipeline</text>
  <text x="800" y="334" class="body">• decimated + smoothed GLB meshes</text>
  <text x="800" y="374" class="body">• Three.js demo + website integration</text>
  <text x="800" y="444" class="muted">result:</text>
  <text x="800" y="482" class="body">“I can explore it interactively.”</text>

  <path d="M670 380H730" stroke="#7f6f62" stroke-width="4" stroke-linecap="round"/>
  <circle cx="730" cy="380" r="8" fill="#7f6f62"/>
</svg>
